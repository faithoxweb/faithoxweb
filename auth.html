<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faithox | Authentication</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        html, body { max-width: 100%; overflow-x: hidden; }
        
        body { 
            background: #242424;
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            width: 100%;
            overflow: hidden; 
            color: #1e293b; 
            -webkit-font-smoothing: antialiased;
        }

        /* --- FULL PAGE LAYOUT --- */
        .page-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        /* --- LEFT SIDE: FLEX PANEL --- */
        .auth-side-anim {
            flex: 1; 
            height: 100%;
            background: url('https://fdjcvpsqossuiljuadkk.supabase.co/storage/v1/object/public/website%20images/Grade%20Grey.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        /* --- RIGHT SIDE: FORM --- */
        .auth-side-form {
            width: 100%; 
            max-width: 500px;
            height: 100%;
            background: #242424;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .form-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background: #f2f2f2;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        .form-container h2 { 
            font-size: 32px; 
            font-weight: 800; 
            color: #0f172a; 
            margin-bottom: 8px; 
            letter-spacing: -0.5px; 
        }

        .form-container p.sub-text { 
            font-size: 16px; 
            color: #64748b; 
            margin-bottom: 25px; 
            font-weight: 500; 
        }

        /* --- MODE TOGGLE SLIDER --- */
        .mode-toggle-container {
            display: flex; 
            background: #e2e8f0; 
            border-radius: 30px; 
            position: relative; 
            width: 100%; 
            height: 46px; 
            margin-bottom: 30px;
        }
        .mode-slider {
            position: absolute; 
            top: 3px; left: 3px; 
            width: calc(50% - 3px); 
            height: 40px; 
            background: #242424; 
            border-radius: 28px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1;
        }
        .mode-btn {
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            font-weight: 700; 
            color: #64748b; 
            cursor: pointer; 
            position: relative; 
            z-index: 2; 
            transition: color 0.3s ease;
        }
        .mode-btn.active { color: #f8f8f8; }

        .input-group { margin-bottom: 20px; }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .auth-input { 
            width: 100%; 
            padding: 16px 20px; 
            border: 2px solid #cbd5e1;
            background: #ffffff;
            border-radius: 12px; 
            font-size: 15px; 
            outline: none; 
            transition: all 0.2s ease; 
            font-weight: 500; 
            color: #242424; 
        }

        .auth-input:focus { 
            border-color: #0f172a;
            background: #e2e8f0; 
            box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.15); 
        }
        
        .auth-input::placeholder { color: #94a3b8; }

        .primary-btn { 
            width: 100%; 
            padding: 18px; 
            background: #242424; 
            color: #f8f8f8; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: all 0.3s ease; 
        }

        .switch-link { 
            margin-top: 30px; 
            font-size: 14px; 
            color: #64748b; 
            cursor: pointer; 
            font-weight: 500; 
            transition: 0.2s; 
            text-align: center; 
        }

        .switch-link span { color: #0f172a; font-weight: 700; }
        .switch-link:hover span { text-decoration: underline; }

        .close-btn { 
            margin-top: 20px; 
            cursor: pointer; 
            color: #94a3b8; 
            font-size: 13px; 
            font-weight: 600; 
            transition: 0.2s; 
            display: block; 
            text-align: center; 
        }
        .close-btn:hover { color: #0f172a; }

        /* --- LOADER STYLES --- */
        .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(15, 23, 42, 0.2); border-top-color: #0f172a; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* NEW TOP PROGRESS BAR */
        .pro-progress-bar { 
            position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: #0f172a; 
            z-index: 999999; transition: width 0.3s ease-out, opacity 0.3s ease; opacity: 0; 
            box-shadow: 0 0 10px rgba(15,23,42,0.5); 
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            body { overflow-y: auto; overflow-x: hidden; }
            .page-wrapper { flex-direction: column; height: auto; min-height: 100vh; }
            
            .auth-side-anim { width: 100%; height: 250px; }
            
            .auth-side-form { max-width: none; width: 100%; height: auto; padding: 20px; flex-grow: 1; border-radius: 0; }
            .form-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div id="pro-progress-bar" class="pro-progress-bar"></div>

    <div class="page-wrapper">
        
        <div class="auth-side-anim"></div>

        <div class="auth-side-form">
            <div class="form-container">

                <h2 id="page-title">Welcome Back</h2>
                <p class="sub-text" id="page-subtext">Sign in to continue to your dashboard.</p>

                <div class="mode-toggle-container">
                    <div class="mode-slider" id="mode-slider"></div>
                    <div class="mode-btn active" id="btn-customer" onclick="setMode('customer')">Shopper</div>
                    <div class="mode-btn" id="btn-business" onclick="setMode('business')">Business</div>
                </div>

              <div id="login-view">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="email-in" class="auth-input" placeholder="name@company.com">
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="pass-in" class="auth-input" placeholder="••••••••">
                    </div>
                    
                    <button class="primary-btn" onclick="handleLogin()">Sign In</button>
                    
                    <p class="switch-link" onclick="toggleAuthMode()">New here? <span>Create an account</span></p>
                    <div class="close-btn" onclick="navigateTo('index.html')">Return to Home</div>
                </div>

                <div id="signup-view" style="display:none;">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="name-up" class="auth-input" placeholder="John Doe">
                    </div>

                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="email-up" class="auth-input" placeholder="name@company.com">
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="pass-up" class="auth-input" placeholder="Create a strong password">
                    </div>
                    
                    <button class="primary-btn" onclick="handleSignup()">Create Account</button>
                    <p class="switch-link" onclick="toggleAuthMode()">Already have an account? <span>Sign In</span></p>
                    <div class="close-btn" onclick="navigateTo('index.html')">Return to Home</div>
                </div>

            </div>
        </div>

    </div>

    <script>
        window.navigateTo = (url) => {
            const bar = document.getElementById('pro-progress-bar');
            if(bar) {
                bar.style.opacity = '1';
                bar.style.width = '60%';
                setTimeout(() => { bar.style.width = '100%'; }, 200);
            }
            setTimeout(() => { window.location.href = url; }, 350);
        };

        window.addEventListener('pageshow', function(event) {
            const bar = document.getElementById('pro-progress-bar');
            if (bar) { bar.style.opacity = '0'; bar.style.width = '0%'; }
        });

        const SUPABASE_URL = 'https://fdjcvpsqossuiljuadkk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZkamN2cHNxb3NzdWlsanVhZGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2MDI5ODYsImV4cCI6MjA4NjE3ODk4Nn0.z2ZutYZi_oLr_wYq6LufLyU3bI3XbRuA33JD8iA5Q6o';
        
        let db;
        try { db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } 
        catch (e) { console.error("Supabase failed to init:", e); }

        // --- NEW MODE TOGGLE LOGIC ---
        let currentRoleMode = 'customer'; // default
        let isLoginView = true;

        function setMode(mode) {
            currentRoleMode = mode;
            const slider = document.getElementById('mode-slider');
            const btnCustomer = document.getElementById('btn-customer');
            const btnBusiness = document.getElementById('btn-business');
            const title = document.getElementById('page-title');
            const subtext = document.getElementById('page-subtext');

            if(mode === 'business') {
                slider.style.left = 'calc(50%)';
                btnCustomer.classList.remove('active');
                btnBusiness.classList.add('active');
                if (isLoginView) {
                    title.innerText = "Business Portal";
                    subtext.innerText = "Sign in to manage your products and analytics.";
                } else {
                    title.innerText = "Partner With Us";
                    subtext.innerText = "Create a business account to grow your brand.";
                }
            } else {
                slider.style.left = '3px';
                btnBusiness.classList.remove('active');
                btnCustomer.classList.add('active');
                if (isLoginView) {
                    title.innerText = "Welcome Back";
                    subtext.innerText = "Sign in to continue reviewing products.";
                } else {
                    title.innerText = "Create Account";
                    subtext.innerText = "Join the community and start reviewing.";
                }
            }
        }

        function toggleAuthMode() {
            const login = document.getElementById('login-view');
            const signup = document.getElementById('signup-view');
            if (login.style.display === 'none') { 
                login.style.display = 'block'; 
                signup.style.display = 'none'; 
                isLoginView = true;
            } else { 
                login.style.display = 'none'; 
                signup.style.display = 'block'; 
                isLoginView = false;
            }
            setMode(currentRoleMode); // Update texts
        }

        // --- AUTH REDIRECT GLITCH FIX ---
        window.onload = async () => {
            if (db) {
                const { data } = await db.auth.getSession();
                if (data.session) {
                    const userRole = data.session.user.user_metadata?.role || 'customer';
                    if (userRole === 'business') {
                        window.location.replace('dashboard.html');
                        return;
                    } else {
                        const params = new URLSearchParams(window.location.search);
                        const returnTo = params.get('returnTo');
                        if (returnTo) {
                            window.location.replace(decodeURIComponent(returnTo));
                        } else {
                            window.location.replace('index.html');
                        }
                        return;
                    }
                }
            }
            const params = new URLSearchParams(window.location.search);
            if(params.get('mode') === 'business') {
                setMode('business');
            }
        };

        // --- AUTH LOGIC ---
        async function handleLogin() {
            if (!db) return;
            const email = document.getElementById('email-in').value;
            const password = document.getElementById('pass-in').value;
            
            const { data, error } = await db.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("Login Failed: " + error.message); 
            } else if (data.session) {
                // VERIFY ROLE RESTRICTION
                const userRole = data.user.user_metadata?.role || 'customer'; // Default to customer if missing
                
                if (userRole !== currentRoleMode) {
                    await db.auth.signOut();
                    alert(`Access Denied: This email belongs to a ${userRole} account. Please switch the slider to ${userRole} to login.`);
                    return;
                }
                
                if (userRole === 'business') {
                    navigateTo('dashboard.html');
                } else {
                    navigateTo('index.html');
                }
            }
        }

        async function handleSignup() {
            if (!db) return;
            const name = document.getElementById('name-up').value;
            const email = document.getElementById('email-up').value;
            const password = document.getElementById('pass-up').value;

            if(!name || !email || !password) {
                alert("Please fill all fields!");
                return;
            }

            // PASS ROLE IN METADATA
            const { data, error } = await db.auth.signUp({ 
                email, 
                password,
                options: {
                    data: {
                        full_name: name,
                        role: currentRoleMode
                    }
                } 
            });
            
            if (error) {
                alert("Signup Failed: " + error.message); 
            } else { 
                alert("Account created successfully!"); 
                
                if (currentRoleMode === 'business') {
                    navigateTo('dashboard.html');
                } else {
                    navigateTo('index.html');
                }
            }
        }
    </script>
</body>
</html>
