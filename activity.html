<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Activity | Faithox</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* --- 1. BASE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body { 
            background-color: #f2f2f2;
            background-image: url('https://fdjcvpsqossuiljuadkk.supabase.co/storage/v1/object/public/website%20images/gradientback.png');
            background-repeat: no-repeat;
            background-position: top center;
            background-size: 100% 350px;
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            width: 100vw;
            overflow-x: hidden; 
            display: flex;
            flex-direction: column;
            color: #1e293b; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- 2. TOP BAR & NAV --- */
        .top-bar { width: 100%; height: 65px; display: flex; align-items: center; padding: 0 40px; background: #242424; position: absolute; top: 0; left: 0; z-index: 2000; }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; margin-right: 30px; }
        .brand-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; text-transform: uppercase; color: #f2f2f2; } 

        .nav-options { display: flex; gap: 23px; align-items: center; margin-right: 30px; height: 100%; position: relative; margin-left: auto; }
        .nav-link { color: #f8f8f8; text-decoration: none; font-size: 13px; font-weight: 500; cursor: pointer; position: relative; height: 65px; display: flex; align-items: center; transition: color 0.2s; }
        
        #nav-slider {
            position: absolute; bottom: 0; left: 0; height: 4px; background-color: #f8f8f8; 
            transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease; 
            width: 0; opacity: 0; pointer-events: none;
            will-change: width, left, opacity;
        }

        /* --- BUTTON --- */
        .auth-trigger-btn { 
            background-color: #3fa3dd;
            color: #242424; 
            height: 38px; 
            padding: 0 13px; 
            border: none;
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 550; 
            letter-spacing: 0.2px;
            position: relative; 
            z-index: 2002; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.1s ease;
        }

        .auth-trigger-btn:hover { background-color: #81bbeb; }

        /* --- ACTIVITY PAGE STYLES --- */
        .page-container {
            padding: 120px 40px 60px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
        }

        .activity-header-title {
            font-size: 32px; font-weight: 800; color: #0f172a; margin-bottom: 8px; letter-spacing: -1px;
        }
        .activity-header-sub {
            font-size: 15px; color: #64748b; margin-bottom: 40px; font-weight: 500;
        }

        .activity-list-item {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .activity-list-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .act-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .act-company { font-weight: 800; color: #0f172a; font-size: 18px; }
        .act-date { color: #94a3b8; font-size: 13px; font-weight: 500; }
        .act-stars { color: #00c853; font-size: 15px; letter-spacing: 2px; margin-bottom: 12px; }
        .act-comment { color: #475569; font-size: 15px; line-height: 1.6; }

        /* --- LOADER --- */
        .pro-progress-bar { position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: #f2f2f2; z-index: 999999; transition: width 0.3s ease-out, opacity 0.3s ease; opacity: 0; box-shadow: 0 0 10px rgba(15,23,42,0.5); }

        @media (max-width: 768px) {
            .nav-options { display: none; }
            .top-bar { padding: 0 20px; }
            .auth-trigger-btn { margin-left: auto; }
            .page-container { padding: 100px 20px 40px; }
        }
    </style>
</head>
<body>
    
    <div id="pro-progress-bar" class="pro-progress-bar"></div>

    <nav class="top-bar">
        <div class="logo-container" onclick="goHome()">
            <span class="brand-text">faithox</span>
        </div>
        
        <div class="nav-options">
            <a class="nav-link">For Business</a>
            <a class="nav-link">Contact Us</a>
            <a class="nav-link" onclick="navigateTo('activity.html')">Your Activity</a>
            <div id="nav-slider"></div>
        </div>

        <button type="button" class="auth-trigger-btn" onclick="openAuth()">
            <span> Signup / Login </span>
        </button>
    </nav>

    <div class="page-container">
        <h1 class="activity-header-title">Your Activity History</h1>
        <p class="activity-header-sub">See the reviews you've shared with the world.</p>

        <div id="activity-list"></div>
    </div>

    <script>
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        window.navigateTo = (url) => {
            const bar = document.getElementById('pro-progress-bar');
            if(bar) {
                bar.style.opacity = '1';
                bar.style.width = '60%';
                setTimeout(() => { bar.style.width = '100%'; }, 200);
            }
            setTimeout(() => { window.location.href = url; }, 350);
        };

        window.addEventListener('pageshow', function(event) {
            const bar = document.getElementById('pro-progress-bar');
            if (bar) {
                bar.style.opacity = '0';
                bar.style.width = '0%';
            }
        });

        window.openAuth = () => {
            const currentUrl = encodeURIComponent(window.location.href);
            navigateTo('auth.html?returnTo=' + currentUrl);
        };
        window.goHome = () => navigateTo('index.html');

        const SUPABASE_URL = 'https://fdjcvpsqossuiljuadkk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_bLQjs0QMG8COtCALOJz7hw_M9NWKRyl';
        
        let db;
        try {
            db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Supabase failed to init:", e);
        }

        let currentUser = null;

        async function checkUser() {
            if (!db) return;
            try {
                const { data } = await db.auth.getSession();
                if (data.session) {
                    currentUser = data.session.user;
                    const btn = document.querySelector('.auth-trigger-btn span');
                    if(btn) btn.innerText = "Logout";
                    
                    document.querySelector('.auth-trigger-btn').onclick = async () => {
                        await db.auth.signOut();
                        window.location.reload();
                    };
                    loadActivity();
                } else {
                    // Redirect to login if unauthenticated on this page
                    openAuth();
                }
            } catch (e) { console.error(e); }
        }

        async function loadActivity() {
            if (!currentUser) return;
            
            const list = document.getElementById('activity-list');
            list.innerHTML = '<p style="color:#64748b; font-size:15px;">Loading your professional history...</p>';

            const { data: reviews, error } = await db
                .from('reviews')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (error) {
                list.innerHTML = '<p style="color:red;">Error loading history.</p>';
                return;
            }

            if (!reviews || reviews.length === 0) {
                list.innerHTML = '<p style="color:#64748b;">You haven\'t posted any reviews yet.</p>';
                return;
            }

            const companyIds = [...new Set(reviews.map(r => r.company_id))];
            const { data: companiesFound } = await db.from('companies').select('id, name').in('id', companyIds);
            
            const companyMap = {};
            if(companiesFound) companiesFound.forEach(c => companyMap[c.id] = c.name);

            list.innerHTML = '';
            reviews.forEach(r => {
                const coName = companyMap[r.company_id] || 'Unknown Company';
                const item = document.createElement('div');
                item.className = 'activity-list-item';
                item.onclick = () => navigateTo(`company.html?id=${r.company_id}`);
                item.innerHTML = `
                    <div class="act-header">
                        <span class="act-company">${escapeHTML(coName)}</span>
                        <span class="act-date">${new Date(r.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</span>
                    </div>
                    <div class="act-stars">${"★".repeat(r.rating)}${"☆".repeat(5-r.rating)}</div>
                    <p class="act-comment">${escapeHTML(r.comment)}</p>
                `;
                list.appendChild(item);
            });
        }

        const navContainer = document.querySelector('.nav-options');
        const slider = document.getElementById('nav-slider');
        const links = document.querySelectorAll('.nav-link');

        if (navContainer && slider) {
            links.forEach(link => {
                link.addEventListener('mouseenter', (e) => {
                    const rect = e.target.getBoundingClientRect();
                    const containerRect = navContainer.getBoundingClientRect();
                    const left = rect.left - containerRect.left; 
                    slider.style.width = `${rect.width}px`;
                    slider.style.left = `${left}px`;
                    slider.style.opacity = '1';
                });
            });
            navContainer.addEventListener('mouseleave', () => { slider.style.opacity = '0'; });
        }

        checkUser();
    </script>
</body>
</html>
