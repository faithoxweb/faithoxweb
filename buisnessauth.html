<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faithox | Business Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        html, body { max-width: 100%; overflow-x: hidden; }
        
        body { 
            background: #242424;
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            width: 100%;
            overflow: hidden; 
            color: #1e293b; 
            -webkit-font-smoothing: antialiased;
        }

        .page-wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        .auth-side-anim {
            flex: 1; 
            height: 100%;
            background: url('https://fdjcvpsqossuiljuadkk.supabase.co/storage/v1/object/public/website%20images/Grade%20Grey.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        .auth-side-form {
            width: 100%; 
            max-width: 500px;
            height: 100%;
            background: #242424;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .form-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background: #f2f2f2;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        .form-container h2 { 
            font-size: 32px; 
            font-weight: 800; 
            color: #0f172a; 
            margin-bottom: 8px; 
            letter-spacing: -0.5px; 
        }

        .form-container p.sub-text { 
            font-size: 16px; 
            color: #64748b; 
            margin-bottom: 25px; 
            font-weight: 500; 
        }

        .input-group { margin-bottom: 20px; }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .auth-input { 
            width: 100%; 
            padding: 16px 20px; 
            border: 2px solid #cbd5e1;
            background: #ffffff;
            border-radius: 12px; 
            font-size: 15px; 
            outline: none; 
            transition: all 0.2s ease; 
            font-weight: 500; 
            color: #242424; 
        }

        .auth-input:focus { 
            border-color: #0f172a;
            background: #e2e8f0; 
            box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.15); 
        }
        
        .auth-input::placeholder { color: #94a3b8; }

        .primary-btn { 
            width: 100%; 
            padding: 18px; 
            background: #3fa3dd; 
            color: #242424; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: all 0.3s ease; 
        }

        .primary-btn:hover { background: #2b8ac1; color: #fff;}

        .switch-link { 
            margin-top: 30px; 
            font-size: 14px; 
            color: #64748b; 
            cursor: pointer; 
            font-weight: 500; 
            transition: 0.2s; 
            text-align: center; 
        }

        .switch-link span { color: #0f172a; font-weight: 700; }
        .switch-link:hover span { text-decoration: underline; }

        .close-btn { 
            margin-top: 20px; 
            cursor: pointer; 
            color: #94a3b8; 
            font-size: 13px; 
            font-weight: 600; 
            transition: 0.2s; 
            display: block; 
            text-align: center; 
        }
        .close-btn:hover { color: #0f172a; }

        .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(15, 23, 42, 0.2); border-top-color: #0f172a; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .pro-progress-bar { 
            position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: #0f172a; 
            z-index: 999999; transition: width 0.3s ease-out, opacity 0.3s ease; opacity: 0; 
            box-shadow: 0 0 10px rgba(15,23,42,0.5); 
        }

        @media (max-width: 768px) {
            body { overflow-y: auto; overflow-x: hidden; }
            .page-wrapper { flex-direction: column; height: auto; min-height: 100vh; }
            .auth-side-anim { width: 100%; height: 250px; }
            .auth-side-form { max-width: none; width: 100%; height: auto; padding: 20px; flex-grow: 1; border-radius: 0; }
            .form-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div id="pro-progress-bar" class="pro-progress-bar"></div>

    <div class="page-wrapper">
        <div class="auth-side-anim"></div>

        <div class="auth-side-form">
            <div class="form-container">

                <h2 id="page-title">Business Portal</h2>
                <p class="sub-text" id="page-subtext">Sign in to manage your products and analytics.</p>

              <div id="login-view">
                    <div class="input-group">
                        <label>Business Email</label>
                        <input type="email" id="email-in" class="auth-input" placeholder="name@company.com">
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="pass-in" class="auth-input" placeholder="••••••••">
                    </div>
                    
                    <button class="primary-btn" onclick="handleLogin()">Sign In to Dashboard</button>
                    
                    <p class="switch-link" onclick="toggleAuthMode()">Want to partner with us? <span>Create business account</span></p>
                    <div class="close-btn" onclick="navigateTo('forbuisness.html')">Return</div>
                </div>

                <div id="signup-view" style="display:none;">
                    <div class="input-group">
                        <label>Company Name</label>
                        <input type="text" id="name-up" class="auth-input" placeholder="Company Inc.">
                    </div>

                    <div class="input-group">
                        <label>Business Email</label>
                        <input type="email" id="email-up" class="auth-input" placeholder="name@company.com">
                    </div>
                    
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="pass-up" class="auth-input" placeholder="Create a strong password">
                    </div>
                    
                    <button class="primary-btn" onclick="handleSignup()">Create Business Account</button>
                    <p class="switch-link" onclick="toggleAuthMode()">Already a partner? <span>Sign In</span></p>
                    <div class="close-btn" onclick="navigateTo('forbuisness.html')">Return</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        window.navigateTo = (url) => {
            const bar = document.getElementById('pro-progress-bar');
            if(bar) {
                bar.style.opacity = '1';
                bar.style.width = '60%';
                setTimeout(() => { bar.style.width = '100%'; }, 200);
            }
            setTimeout(() => { window.location.href = url; }, 350);
        };

        window.addEventListener('pageshow', function(event) {
            const bar = document.getElementById('pro-progress-bar');
            if (bar) { bar.style.opacity = '0'; bar.style.width = '0%'; }
        });

        const SUPABASE_URL = 'https://fdjcvpsqossuiljuadkk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZkamN2cHNxb3NzdWlsanVhZGtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2MDI5ODYsImV4cCI6MjA4NjE3ODk4Nn0.z2ZutYZi_oLr_wYq6LufLyU3bI3XbRuA33JD8iA5Q6o';
        
        let db;
        try { db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } 
        catch (e) { console.error("Supabase failed to init:", e); }

        let isLoginView = true;

        function toggleAuthMode() {
            const login = document.getElementById('login-view');
            const signup = document.getElementById('signup-view');
            const title = document.getElementById('page-title');
            const subtext = document.getElementById('page-subtext');

            if (login.style.display === 'none') { 
                login.style.display = 'block'; 
                signup.style.display = 'none'; 
                isLoginView = true;
                title.innerText = "Business Portal";
                subtext.innerText = "Sign in to manage your products and analytics.";
            } else { 
                login.style.display = 'none'; 
                signup.style.display = 'block'; 
                isLoginView = false;
                title.innerText = "Partner With Us";
                subtext.innerText = "Create a business account to grow your brand.";
            }
        }

        window.onload = async () => {
            if (db) {
                const { data } = await db.auth.getSession();
                if (data.session) {
                    const userRole = data.session.user.user_metadata?.role || 'customer';
                    if (userRole === 'business') {
                        window.location.replace('dashboard.html');
                        return;
                    } else {
                        window.location.replace('index.html');
                        return;
                    }
                }
            }
        };

        async function handleLogin() {
            if (!db) return;
            const email = document.getElementById('email-in').value;
            const password = document.getElementById('pass-in').value;
            
            const { data, error } = await db.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("Login Failed: " + error.message); 
            } else if (data.session) {
                const userRole = data.user.user_metadata?.role || 'customer'; 
                
                if (userRole !== 'business') {
                    await db.auth.signOut();
                    alert(`Access Denied: This email belongs to a customer account. Please use the standard login.`);
                    return;
                }
                
                navigateTo('dashboard.html');
            }
        }

        async function handleSignup() {
            if (!db) return;
            const name = document.getElementById('name-up').value;
            const email = document.getElementById('email-up').value;
            const password = document.getElementById('pass-up').value;

            if(!name || !email || !password) {
                alert("Please fill all fields!");
                return;
            }

            const { data, error } = await db.auth.signUp({ 
                email, 
                password,
                options: {
                    data: {
                        full_name: name,
                        role: 'business'
                    }
                } 
            });
            
            if (error) {
                alert("Signup Failed: " + error.message); 
            } else { 
                alert("Business Account created successfully!"); 
                navigateTo('dashboard.html');
            }
        }
    </script>
</body>
</html>
